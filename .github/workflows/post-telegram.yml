name: Postar no Telegram 3x por dia - Lucrando em Dólar

on:
  schedule:
    - cron: '13 10 * * *'   # 7:13 da manhã (BRT)
    - cron: '21 16 * * *'   # 13:21 da tarde (BRT)
    - cron: '19 23 * * *'   # 20:19 da noite (BRT)

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Enviar post com imagem e texto
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto \
            -d chat_id=${CHAT_ID} \
            -d photo="https://raw.githubusercontent.com/luckasttonn-ai/meu-poster-telegram/main/imagem.jpg" \
            -d caption="r$ 397,00 — método lucrando em dólar%0A%0Acomece a ganhar em dólar mesmo sendo iniciante total%0A%0Ao método lucrando em dólar é um treinamento direto ao ponto, prático e acessível, feito para te ajudar a dar os primeiros passos e conquistar suas primeiras comissões em dólar trabalhando pela internet.%0A%0Atudo explicado em videoaulas gravadas, de forma simples, prática e aplicável — sem enrolação.%0A%0Ao que você vai aprender:%0A• como começar do zero no mercado internacional%0A• estratégias práticas para gerar comissões em dólar%0A• passo a passo simples e direto%0A• método focado em execução e resultado%0A%0Apara quem é esse treinamento:%0A• iniciantes que querem ganhar em dólar%0A• quem já tentou e não teve resultado%0A• quem quer um caminho simples e direto para começar%0A%0Asuporte: afiliados@taynagauche.com%0A%0Ahttps://pay.kiwify.com.br/aU1jkB5?afid=t3rSBk7w" \
            -d parse_mode=HTML
