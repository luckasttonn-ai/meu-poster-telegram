name: Postar no Telegram 3x por dia - Lucrando em Dólar

on:
  workflow_dispatch: {}
  schedule:
    - cron: '13 10 * * *'
    - cron: '21 16 * * *'
    - cron: '19 23 * * *'

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Enviar post Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
