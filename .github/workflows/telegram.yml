name: Telegram Auto Post

on:
  workflow_dispatch:
  schedule:
    - cron: '13 10 * * *'
    - cron: '21 16 * * *'
    - cron: '19 23 * * *'

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Send message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: "🔥 PROMOÇÃO IMPERDÍVEL 🔥 R$397,00 — Método Lucrando em Dólar. Acesse agora: https://pay.kiwify.com.br/aU1jkB5?afid=t3rSBk7w"
